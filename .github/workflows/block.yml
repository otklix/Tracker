name: Block IP
on: issues
jobs:
  block:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          TITLE="${{ github.event.issue.title }}"
          if [[ $TITLE == block_*_forever ]]; then
            IP=${TITLE#block_}; IP=${IP%_forever}
            echo "{\"ip\": \"$IP\", \"until\": null}" >> blocked.json
          fi
          if [[ $TITLE == block_*_10h ]]; then
            IP=${TITLE#block_}; IP=${IP%_10h}
            UNTIL=$(($(date +%s%3N) + 10*60*60*1000))
            echo "{\"ip\": \"$IP\", \"until\": $UNTIL}" >> blocked.json
          fi
          git config user.name "Bot"
          git config user.email "bot@local"
          git add blocked.json
          git commit -m "Block $IP" || true
          git push