name: Process Access
on: issues
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          TITLE="${{ github.event.issue.title }}"
          if [[ $TITLE == approve_* ]]; then
            IP=${TITLE#approve_}
            echo "$(jq --arg ip "$IP" '. += [$ip]' allowed.json)" > allowed.json
          fi
          if [[ $TITLE == block_*_forever ]]; then
            IP=${TITLE#block_}; IP=${IP%_forever}
            echo "$(jq --arg ip "$IP" '. += [{"ip": $ip, "until": null}]' blocked.json)" > blocked.json
          fi
          if [[ $TITLE == block_*_10h ]]; then
            IP=${TITLE#block_}; IP=${IP%_10h}
            UNTIL=$(($(date +%s%3N) + 10*60*60*1000))
            echo "$(jq --arg ip "$IP" --argjson until "$UNTIL" '. += [{"ip": $ip, "until": $until}]' blocked.json)" > blocked.json
          fi
          if [[ $TITLE == unblock_* ]]; then
            IP=${TITLE#unblock_}
            jq --arg ip "$IP" 'map(select(.ip != $ip))' blocked.json > blocked.json.tmp && mv blocked.json.tmp blocked.json
            jq --arg ip "$IP" 'map(select(. != $ip))' allowed.json > allowed.json.tmp && mv allowed.json.tmp allowed.json
          fi
          git config user.name "Bot"
          git config user.email "bot@local"
          git add allowed.json blocked.json
          git commit -m "Update access for $IP" || true
          git push