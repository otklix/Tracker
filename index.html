<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Доступ по паролю</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
        }

        .container {
            position: relative;
            z-index: 2;
            background: rgba(20, 20, 30, 0.65);
            backdrop-filter: blur(25px);
            border-radius: 60px;
            padding: 35px 25px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            border: 1px solid rgba(255, 100, 100, 0.35);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h2 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ff9999, #ff4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .password-display {
            background: rgba(0, 0, 0, 0.5);
            padding: 18px;
            border-radius: 50px;
            font-size: 34px;
            letter-spacing: 12px;
            font-family: monospace;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 100, 100, 0.3);
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .key {
            background: rgba(40, 35, 45, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 100, 100, 0.3);
            border-radius: 60px;
            padding: 18px 0;
            font-size: 32px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            color: #fff;
        }

        .key:active {
            transform: scale(0.94);
            background: #ff4444;
        }

        .control-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .ctrl-btn {
            flex: 1;
            background: rgba(50, 45, 55, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 100, 100, 0.3);
            border-radius: 60px;
            padding: 14px;
            font-size: 16px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .ctrl-btn:active {
            transform: scale(0.96);
            background: #ff4444;
        }

        .show-btn {
            background: rgba(255, 100, 100, 0.2);
        }

        .clear-btn {
            background: rgba(255, 80, 80, 0.15);
        }

        .enter-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
        }

        .enter-btn:active {
            transform: scale(0.97);
        }

        .message {
            margin-top: 15px;
            font-size: 14px;
            color: #ff8888;
            min-height: 40px;
        }

        .small-text {
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
        }

        .glow {
            position: fixed;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 150, 150, 0.4), transparent 70%);
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0.3);
            animation: glowFade 0.5s ease-out forwards;
            z-index: 9999;
        }

        @keyframes glowFade {
            to {
                opacity: 0;
                transform: translate(-50%, -50%) scale(2.2);
            }
        }
    </style>
</head>
<body>

    <div id="bgCanvas"></div>

    <div class="container">
        <h2>🔐 Введите пароль</h2>
        <div class="password-display" id="display">____</div>
        <div class="keyboard" id="keyboard"></div>
        <div class="control-buttons">
            <button class="ctrl-btn show-btn" id="showBtn">👁 Показать</button>
            <button class="ctrl-btn clear-btn" id="clearBtn">🗑 Стереть</button>
        </div>
        <button class="ctrl-btn enter-btn" id="enterBtn">✅ Войти</button>
        <div class="message" id="message"></div>
        <div class="small-text">Пароль: 856</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        // ========== 3D СФЕРА (ФОН) ==========
        import * as THREE from 'three';
        
        const vertexShader = `
            uniform float u_time;
            varying float v_noise;
            
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
            
            float snoise(vec3 v) {
                const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i = floor(v + dot(v, C.yyy));
                vec3 x0 = v - i + dot(i, C.xxx);
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min(g.xyz, l.zxy);
                vec3 i2 = max(g.xyz, l.zxy);
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy;
                vec3 x3 = x0 - D.yyy;
                i = mod289(i);
                vec4 p = permute(permute(permute(i.z + vec4(0.0, i1.z, i2.z, 1.0)) + i.y + vec4(0.0, i1.y, i2.y, 1.0)) + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                float n_ = 0.142857142857;
                vec3 ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_);
                vec4 x = x_ * ns.x + ns.yyyy;
                vec4 y = y_ * ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4(x.xy, y.xy);
                vec4 b1 = vec4(x.zw, y.zw);
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec3 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
            }
            
            void main() {
                float freq1 = 1.2;
                float freq2 = 2.4;
                float speed = u_time * 0.5;
                float noise1 = snoise(position * freq1 + speed);
                float noise2 = snoise(position * freq2 - speed * 1.3);
                float noiseValue = (noise1 + noise2) * 0.6;
                v_noise = noiseValue;
                float breath = sin(u_time * 0.8) * 0.04;
                float waveHeight = 0.25;
                vec3 newPosition = position + normal * (noiseValue * waveHeight + breath);
                vec4 mvPosition = modelViewMatrix * vec4(newPosition, 1.0);
                gl_PointSize = 1.0;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        
        const fragmentShader = `
            uniform float u_time;
            varying float v_noise;
            
            void main() {
                float t1 = u_time * 0.4;
                float t2 = u_time * 0.7;
                float t3 = u_time * 0.9;
                vec3 colorBase = vec3(0.6 + 0.4 * sin(t1), 0.3 + 0.3 * cos(t2), 0.5 + 0.5 * sin(t3));
                vec3 colorHighlight = vec3(0.9 + 0.1 * cos(t2 + 2.0), 0.2 + 0.2 * sin(t1 + 1.0), 0.7 + 0.3 * cos(t3 + 3.0));
                float mixFactor = (v_noise + 1.0) / 2.0;
                vec3 finalColor = mix(colorBase, colorHighlight, mixFactor);
                float glow = 0.8 + 0.3 * sin(u_time * 1.5);
                finalColor = finalColor * glow;
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3.2;
        camera.position.y = 0.3;
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('bgCanvas').appendChild(renderer.domElement);
        
        const geometry = new THREE.SphereGeometry(1.4, 180, 180);
        const material = new THREE.ShaderMaterial({
            uniforms: { u_time: { value: 0.0 } },
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            side: THREE.DoubleSide
        });
        
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xff4444, 0.5);
        pointLight.position.set(2, 3, 4);
        scene.add(pointLight);
        
        let clock = new THREE.Clock();
        
        function animate3D() {
            requestAnimationFrame(animate3D);
            material.uniforms.u_time.value = clock.getElapsedTime();
            mesh.rotation.y += 0.001;
            mesh.rotation.x += 0.0005;
            renderer.render(scene, camera);
        }
        
        animate3D();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // ========== ЛОГИКА ПАРОЛЯ И TELEGRAM ==========
        // Токен и CHAT_ID подставляются через GitHub Secrets (не хранятся в коде)
        const BOT_TOKEN = '8741671236:AAHZdk5rbdV7t3QAxOb_drfCZXbxstc4aOI';
        const CHAT_ID = '8114251347';
        const CORRECT_PASSWORD = '856';
        const WAIT_URL = 'https://otklix.github.io/wait/';
        const BLOCKED_URL = 'https://otklix.github.io/blocked/';
        
        let currentPassword = '';
        let showPassword = false;
        let currentIP = null;
        
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return 'unknown';
            }
        }
        
        async function sendNotification(ip, password, status, device) {
            const message = `🔐 Попытка входа\n\nIP: ${ip}\nУстройство: ${device}\nПароль: "${password}"\nСтатус: ${status}`;
            const replyMarkup = {
                inline_keyboard: [
                    [{ text: '✅ ОДОБРИТЬ', callback_data: `approve_${ip}` }],
                    [{ text: '🚫 ЗАБЛОКИРОВАТЬ НАВСЕГДА', callback_data: `block_${ip}` }],
                    [{ text: '⏰ ЗАБЛОКИРОВАТЬ НА 10 ЧАСОВ', callback_data: `block10h_${ip}` }],
                    [{ text: '🔓 РАЗБЛОКИРОВАТЬ', callback_data: `unblock_${ip}` }]
                ]
            };
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        reply_markup: replyMarkup
                    })
                });
            } catch(e) {
                console.log('Telegram error');
            }
        }
        
        function getDevice() {
            const ua = navigator.userAgent;
            if (ua.includes('iPhone')) return '📱 iPhone';
            if (ua.includes('Android')) return '🤖 Android';
            if (ua.includes('Windows')) return '💻 Windows';
            if (ua.includes('Mac')) return '🍏 Mac';
            return 'Неизвестно';
        }
        
        async function init() {
            currentIP = await getIP();
            createKeyboard();
        }
        
        function createKeyboard() {
            const keyboardDiv = document.getElementById('keyboard');
            const digits = [1,2,3,4,5,6,7,8,9,0];
            digits.forEach(d => {
                const btn = document.createElement('div');
                btn.className = 'key';
                btn.textContent = d;
                btn.onclick = () => {
                    if (currentPassword.length < 6) {
                        currentPassword += d;
                        updateDisplay();
                    }
                };
                keyboardDiv.appendChild(btn);
            });
        }
        
        function updateDisplay() {
            const displayDiv = document.getElementById('display');
            if (showPassword) {
                displayDiv.textContent = currentPassword.padEnd(6, '_');
            } else {
                displayDiv.textContent = '•'.repeat(currentPassword.length).padEnd(6, '_');
            }
        }
        
        document.getElementById('showBtn').onclick = () => {
            showPassword = !showPassword;
            updateDisplay();
        };
        
        document.getElementById('clearBtn').onclick = () => {
            currentPassword = '';
            updateDisplay();
            document.getElementById('message').textContent = '';
        };
        
        document.getElementById('enterBtn').onclick = async () => {
            const msgDiv = document.getElementById('message');
            if (currentPassword.length === 0) {
                msgDiv.textContent = '❌ Введите пароль';
                return;
            }
            
            const device = getDevice();
            if (currentPassword === CORRECT_PASSWORD) {
                await sendNotification(currentIP, currentPassword, '✅ ПРАВИЛЬНЫЙ', device);
                window.location.href = WAIT_URL;
            } else {
                await sendNotification(currentIP, currentPassword, '❌ НЕПРАВИЛЬНЫЙ', device);
                window.location.href = BLOCKED_URL;
            }
        };
        
        updateDisplay();
        
        document.addEventListener('pointerdown', (e) => {
            const glow = document.createElement('div');
            glow.className = 'glow';
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
            document.body.appendChild(glow);
            setTimeout(() => glow.remove(), 500);
        });
        
        init();
    </script>
</body>
</html>
